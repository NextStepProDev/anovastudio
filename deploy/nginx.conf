# Reverse proxy dla ania_fizjo.
#
# UWAGA: domena jeszcze nie kupiona — po zakupie podmień DOMENA.pl (2 vhosty)
# i wystaw certyfikat obejmujący domenę główną, www i api (certbot -d ... x3).
#
# Architektura: frontend (Next.js) na domenie głównej, Strapi w całości na
# subdomenie api.* — panel admina Strapi używa wielu ścieżek root-level
# (/content-manager, /upload, /users-permissions, ...), więc rozdzielenie po
# hostach jest jedynym stabilnym routingiem.

# HTTP: ACME challenge + redirect na HTTPS
server {
    listen 80;
    server_name DOMENA.pl www.DOMENA.pl api.DOMENA.pl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend — Next.js
server {
    listen 443 ssl;
    http2 on;
    server_name DOMENA.pl www.DOMENA.pl;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Strapi — API + panel admina
server {
    listen 443 ssl;
    http2 on;
    server_name api.DOMENA.pl;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Limit spójny z konfiguracją uploadu Strapi (backend/config/plugins.ts)
    client_max_body_size 10m;

    location / {
        proxy_pass http://strapi:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pliki z Media Library — cache po stronie przeglądarki
    location /uploads/ {
        proxy_pass http://strapi:1337;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
