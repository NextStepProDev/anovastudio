# Reverse proxy dla Anova Studio.
#
# Domena: anovastudio.pl (DNS w Cloudflare, rekordy A na razie "DNS only").
# Certyfikat Let's Encrypt obejmuje domenę główną, www i api (certbot -d ... x3).
#
# Architektura: frontend (Next.js) na domenie głównej, Strapi w całości na
# subdomenie api.* — panel admina Strapi używa wielu ścieżek root-level
# (/content-manager, /upload, /users-permissions, ...), więc rozdzielenie po
# hostach jest jedynym stabilnym routingiem.

# HTTP: ACME challenge + redirect na HTTPS
server {
    listen 80;
    server_name anovastudio.pl www.anovastudio.pl api.anovastudio.pl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend — Next.js
server {
    listen 443 ssl;
    http2 on;
    server_name anovastudio.pl www.anovastudio.pl;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Strapi — API + panel admina
server {
    listen 443 ssl;
    http2 on;
    server_name api.anovastudio.pl;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Limit spójny z konfiguracją uploadu Strapi (backend/config/plugins.ts)
    client_max_body_size 10m;

    # Generowanie wariantów obrazów (sharp) na 1 OCPU trwa dłużej niż domyślne
    # 60 s — bez tego uploady w Media Library kończą się 504 mimo sukcesu w tle.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://strapi:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pliki z Media Library — cache po stronie przeglądarki
    location /uploads/ {
        proxy_pass http://strapi:1337;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
